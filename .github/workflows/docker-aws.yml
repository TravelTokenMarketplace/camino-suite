name: build-docker-image-aws

on:
  pull_request:
    branches:
        - c4t
        - dev
        - suite
        - suite-c4t
  push:
    branches:
        - c4t
        - dev
        - suite
        - suite-c4t
    tags:        
      - v*

env:
  node_version: 16
  module_docker_image: "public.ecr.aws/n0m7j6i5/camino-suite-host"
  aws_region: "eu-central-1"

jobs:
  build_docker:    
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare Image Tag
        id: setDefaults
        run: |
          DOCKER_IMAGE_NAME="278308921038.dkr.ecr.eu-central-1.amazonaws.com/chain4travel-prod-ecr-camino-suite"
          echo "create_tag=false" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
              echo "docker_image=$DOCKER_IMAGE_NAME:stage" >> $GITHUB_OUTPUT
              echo "build_env=stage" >> $GITHUB_OUTPUT
              echo "branch=suite-c4t" >> $GITHUB_OUTPUT
              echo "service_name=suite-stage" >> $GITHUB_OUTPUT
              echo "task_definition=suite-stage-task" >> $GITHUB_OUTPUT
              git fetch --force --tags
          elif [[ "${{ github.ref }}" == "refs/heads/c4t" ]] || [[ "${{ github.base_ref }}" == "c4t" ]]; then
              echo "docker_image=$DOCKER_IMAGE_NAME:stage" >> $GITHUB_OUTPUT
              echo "build_env=stage" >> $GITHUB_OUTPUT
              echo "branch=c4t" >> $GITHUB_OUTPUT
              echo "service_name=suite-stage" >> $GITHUB_OUTPUT
              echo "task_definition=suite-stage-task" >> $GITHUB_OUTPUT
              CURRENT_TAG=$(git describe --abbrev=0 --tags)
              if [[ $CURRENT_TAG == *"-rc"* ]]; then
                TAG_TEMP=$(echo "$CURRENT_TAG"|awk -F'-rc' -v OFS='-rc' '{$2=sprintf("%1d",++$2)}7')
                echo "tag=$TAG_TEMP" >> $GITHUB_OUTPUT
                echo "create_tag=true" >> $GITHUB_OUTPUT
              fi
          elif [[ "${{ github.ref }}" == "refs/heads/suite-c4t" ]] || [[ "${{ github.base_ref }}" == "suite-c4t" ]]; then
              echo "docker_image=$DOCKER_IMAGE_NAME:stage" >> $GITHUB_OUTPUT
              echo "build_env=stage" >> $GITHUB_OUTPUT
              echo "branch=suite-c4t" >> $GITHUB_OUTPUT
              echo "service_name=suite-stage" >> $GITHUB_OUTPUT
              echo "task_definition=suite-stage-task" >> $GITHUB_OUTPUT
              CURRENT_TAG=$(git describe --abbrev=0 --tags)
              if [[ $CURRENT_TAG == *"-rc"* ]]; then
                TAG_TEMP=$(echo "$CURRENT_TAG"|awk -F'-rc' -v OFS='-rc' '{$2=sprintf("%1d",++$2)}7')
                echo "tag=$TAG_TEMP" >> $GITHUB_OUTPUT
                echo "create_tag=true" >> $GITHUB_OUTPUT
              fi
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]] || [[ "${{ github.base_ref }}" == "dev" ]]; then
              echo "docker_image=$DOCKER_IMAGE_NAME:dev" >> $GITHUB_OUTPUT
              echo "build_env=dev" >> $GITHUB_OUTPUT
              echo "branch=dev" >> $GITHUB_OUTPUT
              echo "service_name=suite-dev" >> $GITHUB_OUTPUT
              echo "task_definition=suite-dev-task" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/suite" ]] || [[ "${{ github.base_ref }}" == "suite" ]]; then
              echo "docker_image=$DOCKER_IMAGE_NAME:dev" >> $GITHUB_OUTPUT
              echo "build_env=dev" >> $GITHUB_OUTPUT 
              echo "branch=suite" >> $GITHUB_OUTPUT
              echo "service_name=suite-dev" >> $GITHUB_OUTPUT
              echo "task_definition=suite-dev-task" >> $GITHUB_OUTPUT
          else
              echo "docker_image=$DOCKER_IMAGE_NAME:temp" >> $GITHUB_OUTPUT
              echo "branch=temp" >> $GITHUB_OUTPUT
              echo "build_env=dev" >> $GITHUB_OUTPUT
              echo "service_name=suite-temp" >> $GITHUB_OUTPUT
              echo "task_definition=suite-temp-task" >> $GITHUB_OUTPUT   
          fi
      
      - name: Create tag
        if: ${{ (github.ref  == 'refs/heads/suite-c4t') && (github.event_name == 'push') && (steps.setDefaults.outputs.create_tag == 'true') }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a ${{ steps.setDefaults.outputs.tag }} -m "create tag ${{ steps.setDefaults.outputs.tag }} for staging"
          git push --tags

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.aws_region }}
        
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.aws_region }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.aws_region }}.amazonaws.com
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
          
      - name: create module docker image
        if: ${{ (github.event_name == 'push') }}
        run: |        
          docker build . -t ${{ env.module_docker_image }}:${{ steps.setDefaults.outputs.branch }} --build-arg BUILD_ENV=build:${{ steps.setDefaults.outputs.build_env }}
          docker push ${{ env.module_docker_image }}:${{ steps.setDefaults.outputs.branch }}
          
      
      - name: create suite docker image
        run: |
          docker build . -f Dockerfile_SUITE_AWS -t ${{ steps.setDefaults.outputs.docker_image }} --build-arg BUILD_ENV=build:${{ steps.setDefaults.outputs.build_env }} --build-arg EXPLORER_BRANCH=${{ steps.setDefaults.outputs.branch }} --build-arg WALLET_BRANCH=${{ steps.setDefaults.outputs.branch }} --build-arg VOTING_BRANCH=${{ steps.setDefaults.outputs.branch }}

      
      - name: push and deploy dev suite
        if: ${{ (github.event_name == 'push') && (github.ref  == 'refs/heads/suite') }}
        run: |
          docker push ${{ steps.setDefaults.outputs.docker_image }}          
          aws ecs update-service \
            --cluster chain4travel-prod \
            --service ${{ steps.setDefaults.outputs.service_name }} \
            --task-definition ${{ steps.setDefaults.outputs.task_definition }} \
            --force-new-deployment \
            --region ${{ env.aws_region }}  

      - name: push and deploy docker stage suite
        if: ${{(github.event_name == 'push') && (github.ref  == 'refs/heads/suite-c4t') }}
        run: |
          docker push ${{ steps.setDefaults.outputs.docker_image }}          
          aws ecs update-service \
            --cluster chain4travel-prod \
            --service ${{ steps.setDefaults.outputs.service_name }} \
            --task-definition ${{ steps.setDefaults.outputs.task_definition }} \
            --force-new-deployment \
            --region ${{ env.aws_region }}  

      - name: push and deploy docker stage suite
        if: ${{(github.event_name == 'push') && contains(github.ref, 'refs/tags/') }}
        run: |
          docker push ${{ steps.setDefaults.outputs.docker_image }}          
          aws ecs update-service \
            --cluster chain4travel-prod \
            --service ${{ steps.setDefaults.outputs.service_name }} \
            --task-definition ${{ steps.setDefaults.outputs.task_definition }} \
            --force-new-deployment \
            --region ${{ env.aws_region }}  
